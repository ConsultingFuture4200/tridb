name: CI

# Least privilege: these jobs only read the repo (checkout, run tests, apply patches). Grant the
# default token read-only so a compromised action or PR cannot write to the repo.
permissions:
  contents: read

# Fast layer (python) runs on every push/PR. The engine layer builds a ~9.5 GB
# Docker image and is gated behind workflow_dispatch + the nightly schedule — far too
# heavy for per-PR runners.
on:
  push:
    branches: [master]
  pull_request: {}
  workflow_dispatch: {}
  schedule:
    - cron: "17 6 * * *"

# One in-flight run per ref: superseded pushes to the same branch/PR are cancelled.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.lock
      - run: pip install -r requirements.lock
      - run: pytest tests/ -q
      - run: ruff check . && ruff format --check .

  # Fast per-PR gate that the fork patch-chain still APPLIES (apply + sentinels), without the
  # 9.5 GB engine image build. Clones MSVBASE at the pinned commit, inits only the submodules the
  # patches target (hnsw + Postgres; SPTAG is opt-in and skipped), then applies+verifies. This
  # catches upstream drift or a mis-regenerated fork patch that would otherwise merge green and
  # only surface when someone runs scripts/x86build.sh --docker by hand. Does NOT compile the C —
  # the engine job below remains the compile/run gate.
  patches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false
      - run: scripts/ci_check_patches.sh

  # The un-forked graph AM on stock Postgres (roadmap D2 phase 2.4): build the
  # pgvector-based dev image for each PG major and run every pure-SQL graph suite
  # on 8KB pages. This is the CI half of the "CREATE EXTENSION on stock PG 16/17"
  # exit criterion; ARM is validated out-of-band on the DGX Spark (documented in
  # docs/INSTALL_stock_pg.md — GitHub ARM runners are not available on this plan).
  stock-pg:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # The suite list lives ONCE, in Makefile STOCK_TESTS (plan 090 lockstep): this step
      # builds the image and loops the suites via the same target devs run locally.
      - name: graph suites on stock PG${{ matrix.pg }}
        run: make stock-graph-test PG_MAJOR=${{ matrix.pg }}
      # FR-7 on the ship surface: WAL crash-recovery (REDO) driver, 5 scenarios incl. freeze.
      - name: crash-recovery (WAL redo) on stock PG${{ matrix.pg }}
        run: make stock-crash-test PG_MAJOR=${{ matrix.pg }}
      # Plan 100: 0.1.0 -> 0.2.0 ALTER EXTENSION UPDATE gate (data survives the upgrade).
      - name: extension upgrade gate on stock PG${{ matrix.pg }}
        run: make stock-upgrade-test PG_MAJOR=${{ matrix.pg }}
      # Plan 100: single-writer enforcement (second writer blocks, readers unaffected).
      - name: writer-lock gate on stock PG${{ matrix.pg }}
        run: make stock-writer-lock-test PG_MAJOR=${{ matrix.pg }}
      - name: release image builds (prebaked extension)
        run: docker build --build-arg PG_MAJOR=${{ matrix.pg }} -f scripts/pg17/Dockerfile.release -t tridb/postgres-trimodal:pg${{ matrix.pg }} .
      - name: release runtime smoke (start image, install extensions, run canonical query)
        run: bash scripts/pg17_release_smoke.sh tridb/postgres-trimodal:pg${{ matrix.pg }}

  engine:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false
      - run: scripts/x86build.sh --docker
      # Engine-specific gates only: the pytest/ruff legs of test-all already run in the
      # `python` job on every trigger (including this schedule), and this runner has no
      # Python deps installed — test-all here failed every nightly on "No module named pytest".
      - run: make smoke-test graph-test
